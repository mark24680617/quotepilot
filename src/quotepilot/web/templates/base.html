<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuotePilot 🛩️</title>
    <style>
        :root {
            --ink: #1a1d24;
            --muted: #6b7280;
            --line: #e5e7eb;
            --accent: #0f4c81;
            --soft: #f4f6f9;
            --status-running: #b45309;
            --status-awaiting: #b91c1c;
            --status-approved: #15803d;
            --status-rejected: #6b7280;
            --severity-info: #0f4c81;
            --severity-warn: #b45309;
            --severity-block: #b91c1c;
        }
        body {
            font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--ink);
            background: var(--soft);
            margin: 0;
            padding: 0;
        }
        .header {
            position: sticky;
            top: 0;
            background: white;
            border-bottom: 1px solid var(--line);
            z-index: 1000;
        }
        .header .brand {
            display: flex;
            align-items: center;
            padding: 1rem;
            max-width: 1080px;
            margin: 0 auto;
        }
        .header .brand h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--accent);
        }
        .header .brand p {
            margin: 0;
            font-size: 0.875rem;
            color: var(--muted);
        }
        .content {
            max-width: 1080px;
            margin: 0 auto;
            padding: 2rem;
        }
        .footer {
            text-align: center;
            padding: 1rem;
            border-top: 1px solid var(--line);
            color: var(--muted);
        }
        .footer a {
            color: var(--accent);
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid var(--line);
            padding: 0.5rem;
            text-align: left;
        }
        th {
            background-color: var(--soft);
        }
        textarea {
            width: 100%;
            font-family: monospace;
            padding: 0.5rem;
        }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
        }
        .btn-approve {
            background: #15803d;
        }
        .btn-reject {
            background: #b91c1c;
        }
        button:disabled {
            background: gray;
        }
        .badge {
            display: inline-block;
            color: white;
            border-radius: 999px;
            padding: 2px 10px;
            font-size: 12px;
        }
        .st-running {
            background: var(--status-running);
        }
        .st-awaiting_approval {
            background: var(--status-awaiting);
        }
        .st-approved {
            background: var(--status-approved);
        }
        .st-rejected {
            background: var(--status-rejected);
        }
        .st-failed {
            background: var(--status-rejected);
        }
        .st-approve {
            background: var(--status-approved);
        }
        .st-reject {
            background: var(--status-rejected);
        }
        .chip {
            display: inline-block;
            color: white;
            border-radius: 4px;
            padding: 2px 8px;
            margin-right: 4px;
        }
        .sev-info {
            background: var(--severity-info);
        }
        .sev-warn {
            background: var(--severity-warn);
        }
        .sev-block {
            background: var(--severity-block);
        }
        pre {
            background: var(--soft);
            overflow-x: auto;
            padding: 0.5rem;
            border: 1px solid var(--line);
            border-radius: 8px;
        }
        .error-box {
            background: #ffeef0;
            border: 1px solid #f5d0d1;
            padding: 1rem;
            border-radius: 8px;
        }
        .card {
            background: white;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 20px;
        }
        .done::before {
            content: '✅';
            color: green;
            margin-right: 4px;
        }
        li::before {
            content: '⏳';
            margin-right: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="brand">
            <h1><a href="/">QuotePilot 🛩️</a></h1>
            <p>LUQ LABS · email → bilingual quote autopilot · powered by Qwen on Alibaba Cloud</p>
        </div>
    </div>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
    <div class="footer">
        Rates by <a href="https://exchangerate-api.com">Exchange Rate API (exchangerate-api.com)</a>
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
