<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QuotePilot — AI autopilot for inquiry emails</title>
<style>
/* ============ Design tokens ============ */
:root{
  --blue:#0f4c81; --blue-deep:#0b3a64; --blue-ink:#092c4c;
  --blue-tint:#eaf1f7; --blue-ghost:#f4f8fb;
  --ink:#182430; --muted:#5a6b7b; --faint:#93a1ae;
  --bg:#f4f6f9; --card:#ffffff; --line:#e1e8ee; --line2:#eef2f6;
  --ok:#177a4c; --ok-bg:#e6f4ec; --ok-line:#bfe3cf;
  --warn:#8a5c00; --warn-bg:#fbf1d9; --warn-line:#eeda9f;
  --bad:#b23227; --bad-bg:#faeae7; --bad-line:#f0c6bf;
  --info:#0f4c81; --info-bg:#eaf1f7; --info-line:#c4d8e8;
  --amber:#b07900; --amber-bg:#fff8e8;
  --r:14px; --rs:9px;
  --shadow:0 1px 2px rgba(13,36,58,.05),0 6px 20px rgba(13,36,58,.06);
  --shadow-lg:0 2px 4px rgba(13,36,58,.06),0 14px 40px rgba(13,36,58,.10);
  --sans:"Helvetica Neue",Helvetica,"PingFang SC","Hiragino Sans GB","Source Han Sans SC","Noto Sans CJK SC","Microsoft YaHei",system-ui,sans-serif;
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.55;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--blue);text-decoration:none}
a:hover{color:var(--blue-deep)}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:14px;color:var(--ink)}
::selection{background:rgba(15,76,129,.16)}
.mono{font-family:var(--mono)}
.faint{color:var(--faint)}

/* ============ Type ============ */
.ann{font-style:normal;font-weight:500;color:var(--muted)}
h1{font-size:26px;line-height:1.3;letter-spacing:-.01em}
h2{font-size:17px;font-weight:700}
h2 .ann{font-size:12.5px;margin-left:8px;letter-spacing:.02em}
.info-ico{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;margin-left:8px;border-radius:50%;border:1px solid var(--line);background:var(--blue-ghost);color:var(--blue);font:italic 700 11px/1 Georgia,"Times New Roman",serif;cursor:help;position:relative;vertical-align:middle}
.info-ico:hover,.info-ico:focus-visible{border-color:var(--blue);background:var(--blue-tint);outline:none}
.info-ico::after{content:attr(data-tip);position:absolute;left:0;top:calc(100% + 9px);width:288px;max-width:74vw;background:var(--ink);color:#fff;padding:10px 12px;border-radius:10px;font:400 12px/1.55 var(--sans);box-shadow:var(--shadow-lg);opacity:0;visibility:hidden;transform:translateY(-3px);transition:opacity .13s,transform .13s;z-index:60;pointer-events:none;text-align:left;white-space:normal}
.info-ico::before{content:"";position:absolute;left:11px;top:calc(100% + 3px);border:6px solid transparent;border-bottom-color:var(--ink);opacity:0;visibility:hidden;transition:opacity .13s;z-index:61}
.info-ico:hover::after,.info-ico:focus-visible::after{opacity:1;visibility:visible;transform:translateY(0)}
.info-ico:hover::before,.info-ico:focus-visible::before{opacity:1;visibility:visible}
.sub{color:var(--muted);font-size:13.5px;margin-top:4px}
.sub .ann{color:var(--faint)}
:lang(zh) h1,:lang(zh) h2{letter-spacing:0}

/* ============ Shell ============ */
.top{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.top-in{max-width:1060px;margin:0 auto;padding:0 22px;height:58px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{display:flex;align-items:center;gap:10px;color:var(--ink)}
.logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--blue-deep));color:#fff;display:grid;place-items:center;font-weight:800;font-size:12.5px;letter-spacing:.02em;box-shadow:0 2px 6px rgba(15,76,129,.35)}
.brand b{font-size:15.5px;font-weight:750;letter-spacing:-.01em}
.brand i{font-style:normal;font-weight:500;color:var(--muted);font-size:12.5px;margin-left:7px}
.nav{display:flex;gap:4px}
.nav[hidden]{display:none}
.nav a{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:9px;font-size:14px;font-weight:600;color:var(--muted)}
.nav a:hover{background:var(--blue-ghost);color:var(--ink)}
.nav a.on{background:var(--blue-tint);color:var(--blue-deep)}
main{flex:1;width:100%}
.wrap{max-width:1060px;margin:0 auto;padding:26px 22px 90px}
.foot{border-top:1px solid var(--line);background:#fff}
.foot-in{max-width:1060px;margin:0 auto;padding:18px 22px;font-size:12px;color:var(--faint);display:flex;flex-wrap:wrap;gap:6px 24px}
.foot-in a{color:var(--muted)}

/* ============ Cards / layout ============ */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.card+.card,.card+section,section+.card{margin-top:18px}
.card-pad{padding:22px 24px}
.sec-h{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:30px 2px 12px}
.view{animation:fadeUp .35s cubic-bezier(.2,.7,.3,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ============ Buttons ============ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:10px;border:1px solid transparent;font-weight:650;font-size:14px;padding:9px 16px;transition:transform .08s ease,box-shadow .15s ease,background .15s ease;user-select:none;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-pri{background:var(--blue);color:#fff;box-shadow:0 1px 2px rgba(11,58,100,.3),0 4px 12px rgba(15,76,129,.22)}
.btn-pri:hover:not(:disabled){background:var(--blue-deep)}
.btn-big{font-size:15.5px;padding:12px 24px;border-radius:12px}
.btn-ghost{background:#fff;border-color:var(--line);color:var(--ink)}
.btn-ghost:hover:not(:disabled){border-color:#c8d3dd;background:var(--blue-ghost)}
.btn-ok{background:var(--ok);color:#fff;box-shadow:0 1px 2px rgba(23,122,76,.3),0 4px 12px rgba(23,122,76,.2)}
.btn-ok:hover:not(:disabled){background:#12653e}
.btn-danger{background:#fff;border-color:var(--bad-line);color:var(--bad)}
.btn-danger:hover:not(:disabled){background:var(--bad-bg)}
.btn-sm{font-size:12.5px;padding:6px 11px;border-radius:8px}
.btn .spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite}
.btn-ghost .spin,.btn-danger .spin{border-color:rgba(15,76,129,.25);border-top-color:var(--blue)}
@keyframes rot{to{transform:rotate(360deg)}}

/* ============ Pills / severity ============ */
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:650;padding:3.5px 10px;border-radius:99px;border:1px solid;white-space:nowrap}
.pill i{width:6px;height:6px;border-radius:50%;background:currentColor;flex:none}
.p-running{color:var(--blue);background:var(--info-bg);border-color:var(--info-line)}
.p-running i{animation:blink 1.1s ease-in-out infinite}
@keyframes blink{50%{opacity:.25}}
.p-awaiting{color:var(--amber);background:var(--amber-bg);border-color:var(--warn-line)}
.p-approved{color:var(--ok);background:var(--ok-bg);border-color:var(--ok-line)}
.p-rejected{color:var(--muted);background:#f1f4f7;border-color:var(--line)}
.p-failed{color:var(--bad);background:var(--bad-bg);border-color:var(--bad-line)}
.p-unknown{color:var(--muted);background:#f1f4f7;border-color:var(--line)}

/* ============ Dashboard hero ============ */
.hero{padding:26px 26px 22px;border-radius:16px;background:linear-gradient(180deg,#fff 0%,#fbfdfe 100%)}
.samples{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0 10px}
.samples-label{font-size:12px;color:var(--faint);align-self:center;margin-right:2px}
.chip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;border-radius:99px;padding:6px 13px;font-size:12.5px;font-weight:600;color:var(--ink);transition:all .15s}
.chip:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-ghost)}
.chip .lang{font-size:9.5px;font-weight:800;letter-spacing:.06em;color:#fff;background:var(--faint);border-radius:4px;padding:1.5px 5px}
.chip:hover .lang{background:var(--blue)}
.chip.loading{opacity:.55;pointer-events:none}
.email-box{width:100%;min-height:190px;resize:vertical;border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-size:13.5px;line-height:1.6;font-family:var(--mono);background:#fcfdfe;transition:border-color .15s,box-shadow .15s}
.email-box:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(15,76,129,.12)}
.email-box::placeholder{color:var(--faint);font-family:var(--sans)}
.hero-foot{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:14px;flex-wrap:wrap}
.char-hint{font-size:12px;color:var(--faint)}
.char-hint.bad{color:var(--bad);font-weight:600}

/* ============ Run rows ============ */
.rows{display:flex;flex-direction:column}
.row{display:grid;grid-template-columns:1fr auto auto auto;gap:10px 18px;align-items:center;padding:13px 20px;border-top:1px solid var(--line2);color:var(--ink);transition:background .12s}
.row:first-child{border-top:none}
.row:hover{background:var(--blue-ghost)}
.row-main{min-width:0}
.row-main b{display:block;font-size:14px;font-weight:650;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-sub{font-size:11.5px;color:var(--faint);margin-top:1px}
.row-amt{text-align:right;line-height:1.3}
.row-amt b{display:block;font-size:14px;font-variant-numeric:tabular-nums}
.row-amt span{font-size:11.5px;color:var(--faint);font-variant-numeric:tabular-nums}
.row-time{font-size:11.5px;color:var(--faint);min-width:64px;text-align:right}
.empty-hint{padding:26px 20px;text-align:center;color:var(--faint);font-size:13px}
.live-tag{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;letter-spacing:.05em;color:var(--ok);text-transform:uppercase}
.live-tag i{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:blink 1.2s infinite}

/* ============ Pipeline ============ */
.pipe-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap}
.pipe-meta{display:flex;gap:14px;font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
.pipe-meta b{color:var(--blue);font-size:15px}
.pipe{margin-top:22px}
.stg{display:grid;grid-template-columns:26px 1fr auto;gap:0 14px;position:relative}
.stg-rail{display:flex;flex-direction:column;align-items:center}
.stg-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);background:#fff;display:grid;place-items:center;font-size:11px;font-weight:800;color:#fff;flex:none;transition:all .3s;z-index:1}
.stg-line{width:2px;flex:1;background:var(--line);min-height:18px;transition:background .3s}
.stg-body{padding:0 0 20px}
.stg:last-child .stg-body{padding-bottom:2px}
.stg-zh{font-size:14.5px;font-weight:650;color:var(--faint);transition:color .3s;line-height:22px}
.stg-note{font-size:12px;color:var(--muted);margin-top:2px;min-height:0}
.stg-state{font-size:11px;font-weight:650;color:var(--faint);line-height:22px;font-variant-numeric:tabular-nums}
.stg.is-done .stg-dot{background:var(--ok);border-color:var(--ok)}
.stg.is-done .stg-dot::after{content:"✓"}
.stg.is-done .stg-line{background:var(--ok-line)}
.stg.is-done .stg-zh{color:var(--ink)}
.stg.is-done .stg-state{color:var(--ok)}
.stg.is-active .stg-dot{border-color:var(--blue);box-shadow:0 0 0 5px rgba(15,76,129,.13);animation:ring 1.4s ease-in-out infinite}
@keyframes ring{50%{box-shadow:0 0 0 8px rgba(15,76,129,.06)}}
.stg.is-active .stg-dot::after{content:"";width:8px;height:8px;border-radius:50%;background:var(--blue);animation:blink 1s infinite}
.stg.is-active .stg-zh{color:var(--blue-deep)}
.stg.is-active .stg-state{color:var(--blue)}
.stg.is-active .stg-note{background:linear-gradient(90deg,var(--muted) 25%,var(--faint) 45%,var(--muted) 65%);background-size:200% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:sheen 1.6s linear infinite}
@keyframes sheen{to{background-position:-200% 0}}
.stg.is-failed .stg-dot{background:var(--bad);border-color:var(--bad)}
.stg.is-failed .stg-dot::after{content:"✕"}
.stg.is-failed .stg-zh{color:var(--bad)}
.stg.is-failed .stg-state{color:var(--bad)}
.reconnect{margin-top:16px;font-size:12.5px;color:var(--amber);background:var(--amber-bg);border:1px solid var(--warn-line);border-radius:9px;padding:8px 13px;display:flex;align-items:center;gap:8px}
.reconnect::before{content:"";width:8px;height:8px;border:2px solid var(--amber);border-top-color:transparent;border-radius:50%;animation:rot .8s linear infinite;flex:none}

/* ============ Approval gate ============ */
.gate{border:1px solid var(--warn-line);border-radius:16px;background:linear-gradient(180deg,var(--amber-bg),#fff 60%);box-shadow:var(--shadow-lg);overflow:hidden}
.gate-band{padding:22px 26px 20px;border-bottom:1px dashed var(--warn-line)}
.gate-badge{display:inline-flex;align-items:center;gap:7px;font-size:10.5px;font-weight:800;letter-spacing:.09em;color:var(--amber);background:#fff;border:1px solid var(--warn-line);border-radius:99px;padding:4px 11px;text-transform:uppercase}
.gate-badge i{width:7px;height:7px;border-radius:50%;background:var(--amber);animation:blink 1.4s infinite}
.gate-band h2{font-size:20px;margin-top:12px;letter-spacing:-.01em}
.ministages{display:flex;align-items:center;gap:5px;margin-top:14px;flex-wrap:wrap}
.ministages .md{width:9px;height:9px;border-radius:50%;background:var(--ok)}
.ministages .ml{width:14px;height:2px;background:var(--ok-line)}
.ministages .mg{width:22px;height:22px;border-radius:50%;border:2px dashed var(--amber);display:grid;place-items:center;margin-left:2px}
.ministages .mg i{width:8px;height:8px;border-radius:50%;background:var(--amber)}
.ministages .mtxt{font-size:11.5px;color:var(--muted);margin-left:8px}

/* stats strip */
.stats{display:flex;flex-wrap:wrap;gap:0}
.stat{padding:16px 26px;border-right:1px solid var(--line2);min-width:150px}
.stat:last-child{border-right:none}
.stat .k{font-size:11px;font-weight:650;color:var(--faint);letter-spacing:.04em}
.stat .v{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px;letter-spacing:-.01em}
.stat .v small{font-size:12px;color:var(--muted);font-weight:550;margin-left:6px}

/* flags */
.flag{display:grid;grid-template-columns:auto 1fr;gap:12px;padding:13px 16px;border:1px solid;border-radius:11px;margin-top:10px;background:#fff}
.flag:first-child{margin-top:0}
.flag .sev{font-size:10px;font-weight:800;letter-spacing:.06em;border-radius:6px;padding:3px 8px;height:fit-content;text-transform:uppercase;white-space:nowrap}
.flag .zh{font-size:13.5px;font-weight:600;line-height:1.5}
.flag .en{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5}
.flag code{font-size:10.5px;color:var(--faint);font-family:var(--mono);display:block;margin-top:5px}
.f-info{border-color:var(--info-line);background:linear-gradient(90deg,var(--info-bg),#fff 30%)}
.f-info .sev{background:var(--info-bg);color:var(--info)}
.f-warn{border-color:var(--warn-line);background:linear-gradient(90deg,var(--warn-bg),#fff 30%)}
.f-warn .sev{background:var(--warn-bg);color:var(--warn)}
.f-block{border-color:var(--bad-line);background:linear-gradient(90deg,var(--bad-bg),#fff 30%)}
.f-block .sev{background:var(--bad-bg);color:var(--bad)}
.noflags{display:flex;align-items:center;gap:9px;padding:14px 16px;border:1px solid var(--ok-line);background:var(--ok-bg);border-radius:11px;font-size:13px;font-weight:600;color:var(--ok)}

/* summary + preview */
.summary-pre{font-family:var(--mono);font-size:12.5px;line-height:1.7;white-space:pre-wrap;word-break:break-word;background:#fbfcfd;border:1px solid var(--line2);border-radius:10px;padding:15px 17px;max-height:340px;overflow:auto;color:#2c3a47}
.preview-frame{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff;position:relative}
.preview-frame iframe{display:block;width:100%;height:560px;border:none;background:#fff}
.preview-load{position:absolute;inset:0;display:grid;place-items:center;background:#fbfcfd;font-size:13px;color:var(--muted)}
.approve-grid{display:grid;grid-template-columns:5fr 6fr;gap:18px;margin-top:18px;align-items:start}
.notes-box{width:100%;min-height:76px;resize:vertical;border:1px solid var(--line);border-radius:10px;padding:11px 14px;font-size:13.5px;line-height:1.6;background:#fff}
.notes-box:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(15,76,129,.12)}
.decide{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap}
.decide .btn{flex:1;min-width:170px;padding:13px 20px;font-size:15px}
.block-note{margin-top:12px;font-size:12.5px;color:var(--bad);background:var(--bad-bg);border:1px solid var(--bad-line);border-radius:9px;padding:9px 13px;line-height:1.55}

/* outcome */
.banner{display:flex;align-items:center;gap:16px;padding:20px 26px;border-radius:16px;border:1px solid;box-shadow:var(--shadow)}
.banner .bi{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;font-size:19px;font-weight:800;color:#fff;flex:none}
.banner h2{font-size:19px}
.b-ok{background:linear-gradient(180deg,var(--ok-bg),#fff);border-color:var(--ok-line)}
.b-ok .bi{background:var(--ok)}
.b-rej{background:#f4f6f8;border-color:var(--line)}
.b-rej .bi{background:var(--faint)}
.b-bad{background:linear-gradient(180deg,var(--bad-bg),#fff);border-color:var(--bad-line)}
.b-bad .bi{background:var(--bad)}
.artifacts{display:flex;gap:9px;flex-wrap:wrap}
.art-chip{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 13px;font-size:12.5px;font-weight:600;color:var(--ink);transition:all .15s}
.art-chip:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-ghost)}
.art-chip .kind{font-size:9.5px;font-weight:800;letter-spacing:.05em;color:var(--blue);background:var(--blue-tint);border-radius:4px;padding:2px 6px;text-transform:uppercase}
.art-chip.loading{opacity:.55;pointer-events:none}
.tokens-line{font-size:12px;color:var(--faint);margin-top:14px}
.tokens-line b{color:var(--muted);font-variant-numeric:tabular-nums}
.err-pre{font-family:var(--mono);font-size:12.5px;white-space:pre-wrap;word-break:break-word;background:var(--bad-bg);border:1px solid var(--bad-line);color:var(--bad);border-radius:10px;padding:14px 16px;margin-top:14px;max-height:260px;overflow:auto}
.back-line{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.back-link{font-size:13px;font-weight:600;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
.back-link:hover{color:var(--blue)}
.run-id{font-size:11.5px;color:var(--faint);font-family:var(--mono)}

/* ============ Settings ============ */
.lang-card{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.lang-card .lc-txt h2{margin-bottom:2px}
.seg{display:inline-flex;background:var(--blue-ghost);border:1px solid var(--line);border-radius:11px;padding:3px;gap:3px}
.seg button{border:none;background:transparent;border-radius:8px;padding:8px 18px;font-size:14px;font-weight:650;color:var(--muted);transition:all .15s;white-space:nowrap}
.seg button.on{background:#fff;color:var(--blue-deep);box-shadow:0 1px 3px rgba(13,36,58,.14)}
.import-card{background:linear-gradient(135deg,#f5f9fd,#fff 55%);border-color:var(--info-line)}
.import-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.import-row input{flex:1;min-width:220px;border:1px solid var(--line);border-radius:10px;padding:10px 14px;background:#fff}
.import-row input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(15,76,129,.12)}
.import-phase{margin-top:12px;font-size:13px;color:var(--blue);display:flex;align-items:center;gap:9px}
.import-phase::before{content:"";width:12px;height:12px;border:2px solid var(--info-line);border-top-color:var(--blue);border-radius:50%;animation:rot .8s linear infinite;flex:none}
.import-note{margin-top:12px;font-size:13px;border-radius:9px;padding:10px 14px;line-height:1.55}
.in-ok{background:var(--ok-bg);border:1px solid var(--ok-line);color:var(--ok)}
.in-warn{background:var(--warn-bg);border:1px solid var(--warn-line);color:var(--warn)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px 18px;margin-top:16px}
.fld{display:flex;flex-direction:column;gap:5px}
.fld>span{font-size:12px;font-weight:650;color:var(--muted)}
.fld input,.fld textarea{border:1px solid var(--line);border-radius:9px;padding:9px 12px;background:#fff;transition:border-color .15s,box-shadow .15s}
.fld textarea{min-height:66px;resize:vertical;line-height:1.55}
.fld input:focus,.fld textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(15,76,129,.12)}
.fld.full{grid-column:1/-1}
.scroll-x{overflow-x:auto;margin-top:16px;border:1px solid var(--line2);border-radius:11px}
.cat-table{border-collapse:collapse;width:100%;min-width:880px;font-size:13px}
.cat-table th{font-size:11px;font-weight:700;color:var(--faint);text-align:left;padding:9px 10px;background:#f8fafc;border-bottom:1px solid var(--line2);letter-spacing:.03em;white-space:nowrap}
.cat-table td{padding:6px 6px;border-bottom:1px solid var(--line2);vertical-align:middle}
.cat-table tr.desc-row td{padding-top:0;border-bottom:1px solid var(--line);padding-bottom:10px}
.cat-table tr:last-child td{border-bottom:none}
.cat-table input{width:100%;border:1px solid transparent;border-radius:7px;padding:7px 9px;background:transparent;font-size:12.5px}
.cat-table input:hover{background:#f6f9fb}
.cat-table input:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 2px rgba(15,76,129,.1)}
.cat-table .num input{text-align:right;font-variant-numeric:tabular-nums;font-family:var(--mono);font-size:12px}
.cat-table .disc input{font-family:var(--mono);font-size:12px}
.del-btn{border:none;background:none;color:var(--faint);font-size:15px;padding:5px 8px;border-radius:7px;line-height:1}
.del-btn:hover{color:var(--bad);background:var(--bad-bg)}
.demo-note{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;color:var(--muted);background:var(--blue-ghost);border:1px solid var(--line2);border-radius:11px;padding:12px 16px;line-height:1.6}
.demo-note b{color:var(--blue-deep)}
.savebar{position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(24,36,48,.97);backdrop-filter:blur(8px);color:#fff;transform:translateY(110%);transition:transform .28s cubic-bezier(.2,.8,.3,1)}
.savebar.show{transform:none}
.savebar-in{max-width:1060px;margin:0 auto;padding:12px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.savebar-in>span{font-size:13.5px;font-weight:600}
.savebar-in .btns{display:flex;gap:10px}
.savebar .btn-ghost{background:transparent;border-color:rgba(255,255,255,.25);color:#fff}
.savebar .btn-ghost:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.4)}
.api-line{margin-top:22px;font-size:11px;color:var(--faint);font-family:var(--mono);word-break:break-all}

/* ============ Skeleton / toast / misc ============ */
.skel{border-radius:9px;background:linear-gradient(90deg,#eef2f6 25%,#f7fafc 45%,#eef2f6 65%);background-size:200% 100%;animation:sheenbg 1.4s linear infinite}
@keyframes sheenbg{to{background-position:-200% 0}}
.coldstart{display:flex;align-items:center;gap:10px;margin-top:18px;font-size:13px;color:var(--muted)}
.coldstart::before{content:"";width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:rot .9s linear infinite;flex:none}
#toasts{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:max-content;max-width:92vw}
.toast{background:#182430;color:#fff;font-size:13.5px;font-weight:600;border-radius:10px;padding:11px 18px;box-shadow:0 8px 30px rgba(13,36,58,.35);animation:toastIn .3s cubic-bezier(.2,.9,.3,1.3) both;max-width:100%}
.toast.t-warn{background:#7a5200}
.toast.t-bad{background:#8f2a20}
.toast.t-ok{background:var(--ok)}
@keyframes toastIn{from{opacity:0;transform:translateY(14px) scale(.95)}to{opacity:1;transform:none}}
.center-card{max-width:560px;margin:40px auto;text-align:center;padding:40px 34px}
.center-card .glyph{width:52px;height:52px;border-radius:50%;margin:0 auto 18px;display:grid;place-items:center;font-size:22px;font-weight:800}
.center-card p{color:var(--muted);font-size:13.5px;margin:12px 0 20px;line-height:1.65}

/* ============ Responsive ============ */
@media (max-width:860px){
  .approve-grid{grid-template-columns:1fr}
  .grid2{grid-template-columns:1fr}
  .stats{flex-direction:column}
  .stat{border-right:none;border-bottom:1px solid var(--line2);padding:13px 24px}
  .stat:last-child{border-bottom:none}
}
@media (max-width:560px){
  .wrap{padding:18px 14px 110px}
  .top-in{padding:0 14px}
  .brand i{display:none}
  h1{font-size:21px}
  .hero{padding:20px 16px}
  .card-pad{padding:18px 16px}
  .row{grid-template-columns:1fr auto;grid-template-rows:auto auto;padding:12px 16px}
  .row-time{display:none}
  .row-amt{text-align:left;grid-row:2;grid-column:1}
  .decide .btn{min-width:100%}
  .preview-frame iframe{height:440px}
  .savebar-in{padding:10px 14px;flex-wrap:wrap}
  .hero-foot .btn-big{width:100%}
  .lang-card{flex-direction:column;align-items:stretch}
}
</style>
</head>
<body>

<header class="top">
  <div class="top-in">
    <a class="brand" href="#/"><span class="logo">QP</span><b>QuotePilot<i id="brandTag"></i></b></a>
    <nav class="nav">
      <a href="#/" data-nav="dash" id="navDash"></a>
      <a href="#/settings" data-nav="settings" id="navSettings"></a>
      <a href="#" id="navLogout" class="nav-logout"></a>
    </nav>
  </div>
</header>

<main><div class="wrap" id="app"></div></main>

<footer class="foot">
  <div class="foot-in">
    <span id="footBrand"></span>
    <span>Backend: Alibaba Cloud Function Compute (ap-southeast-1)</span>
    <span>Rates by <a href="https://www.exchangerate-api.com" target="_blank" rel="noopener">Exchange Rate API</a> (https://www.exchangerate-api.com)</span>
  </div>
</footer>

<div id="toasts"></div>

<script>
"use strict";
/* ================= Core ================= */
const API = localStorage.getItem("QP_API") || "https://quotepilot-kafogbnbjc.ap-southeast-1.fcapp.run";
let TOKEN = localStorage.getItem("QP_TOKEN") || "";
let USERNAME = localStorage.getItem("QP_USER") || "";
function setSession(token, username) {
  TOKEN = token || ""; USERNAME = username || "";
  try { localStorage.setItem("QP_TOKEN", TOKEN); localStorage.setItem("QP_USER", USERNAME); } catch (e) {}
  applyChrome();
}
function clearSession() {
  TOKEN = ""; USERNAME = "";
  try { localStorage.removeItem("QP_TOKEN"); localStorage.removeItem("QP_USER"); } catch (e) {}
  applyChrome();  // refresh footer + hide nav, symmetric with setSession
}
function authHeader() { return TOKEN ? { "Authorization": "Bearer " + TOKEN } : {}; }
const $ = (s, el) => (el || document).querySelector(s);
const $$ = (s, el) => Array.from((el || document).querySelectorAll(s));
const app = document.getElementById("app");
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const sleep = ms => new Promise(r => setTimeout(r, ms));
// The bilingual auto-complete rule, surfaced via the ⓘ icon on settings sections.
const autoTranslateRule = () => L(
  "Fill in just one language — on Save, a Qwen agent auto-translates the missing side. Legal terms are the one exception: they are never AI-translated.",
  "只需填写一种语言——保存时 Qwen 智能体会自动补齐缺失的另一种。唯一例外是法律条款：绝不会经 AI 翻译。"
);
function infoIcon(tip) {
  return `<span class="info-ico" tabindex="0" role="note" aria-label="${esc(tip)}" data-tip="${esc(tip)}">i</span>`;
}

/* ---- language ---- */
let LANG = localStorage.getItem("QP_LANG") || "en";
if (LANG !== "zh" && LANG !== "en") LANG = "en";
const L = (en, zh) => LANG === "zh" ? zh : en;
function setLang(v) {
  LANG = v;
  localStorage.setItem("QP_LANG", v);
  applyChrome();
  route();
}
function applyChrome() {
  document.documentElement.lang = LANG === "zh" ? "zh-CN" : "en";
  $("#brandTag").textContent = L("Quote autopilot", "报价领航");
  const nav = document.querySelector(".nav");
  if (nav) nav.hidden = !TOKEN;  // hide nav until signed in
  const nd = $("#navDash"); if (nd) nd.textContent = L("Dashboard", "工作台");
  const ns = $("#navSettings"); if (ns) ns.textContent = L("Settings", "设置");
  const nl = $("#navLogout"); if (nl) nl.textContent = USERNAME ? L("Sign out", "退出") : "";
  const fb = $("#footBrand");
  if (fb) fb.textContent = USERNAME
    ? L("Signed in as ", "当前用户：") + USERNAME
    : L("QuotePilot · Agent powered by Qwen", "QuotePilot · 智能体由通义千问驱动");
}

async function jfetch(path, opts) {
  opts = opts || {};
  const o = Object.assign({}, opts, { headers: Object.assign({ "Content-Type": "application/json" }, authHeader(), opts.headers || {}) });
  const r = await fetch(API + path, o);
  const txt = await r.text();
  let body = null;
  try { body = txt ? JSON.parse(txt) : null; } catch (e) { body = txt; }
  if (!r.ok) {
    if (r.status === 401 && path !== "/api/auth") { clearSession(); renderAuth(); }
    const msg = (body && typeof body === "object" && (body.detail || body.error || body.message)) || ("HTTP " + r.status);
    const err = new Error(typeof msg === "string" ? msg : JSON.stringify(msg));
    err.status = r.status; err.body = body;
    throw err;
  }
  return body;
}

const _num = n => Number(String(n).replace(/,/g, ""));
const fmtUSD = n => { if (n == null) return "—"; const v = _num(n); return isNaN(v) ? String(n) : "$" + v.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); };
const fmtCNY = n => { if (n == null) return "—"; const v = _num(n); return isNaN(v) ? String(n) : "¥" + v.toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); };
function fmtTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d)) return String(iso).slice(0, 16);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff > -30 && diff < 60) return L("just now", "刚刚");
  if (diff < 3600 && diff > 0) return Math.floor(diff / 60) + L(" min ago", " 分钟前");
  if (diff < 86400 && diff > 0) return Math.floor(diff / 3600) + L(" h ago", " 小时前");
  return (d.getMonth() + 1) + "-" + String(d.getDate()).padStart(2, "0") + " " + String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
}

const STATUS = {
  running:            { en: "Running",           zh: "运行中",  cls: "running"  },
  awaiting_approval:  { en: "Awaiting approval",  zh: "待审批",  cls: "awaiting" },
  approved:           { en: "Approved",           zh: "已批准",  cls: "approved" },
  rejected:           { en: "Rejected",           zh: "已驳回",  cls: "rejected" },
  failed:             { en: "Failed",             zh: "失败",    cls: "failed"   }
};
function pill(st) {
  const m = STATUS[st] || { en: st || "Unknown", zh: st || "未知", cls: "unknown" };
  return `<span class="pill p-${m.cls}"><i></i>${esc(L(m.en, m.zh))}</span>`;
}

const STAGES = [
  { key: "intake",         en: "Parse inquiry",   zh: "解析询价"    },
  { key: "fx",             en: "Live USD/CNY FX", zh: "实时汇率"    },
  { key: "pricing",        en: "Catalog pricing", zh: "目录定价"    },
  { key: "risk_rules",     en: "Rule-based risk", zh: "规则风控"    },
  { key: "risk_llm_sweep", en: "AI risk sweep",   zh: "AI 风控扫描" },
  { key: "drafting",       en: "Bilingual draft", zh: "双语起草"    }
];
const SEV = {
  info:  { en: "INFO",  zh: "提示" },
  warn:  { en: "WARN",  zh: "注意" },
  block: { en: "BLOCK", zh: "阻断" }
};

function toast(msg, kind) {
  const box = document.getElementById("toasts");
  const t = document.createElement("div");
  t.className = "toast" + (kind ? " t-" + kind : "");
  t.textContent = msg;
  box.appendChild(t);
  setTimeout(() => { t.style.transition = "opacity .3s"; t.style.opacity = "0"; setTimeout(() => t.remove(), 320); }, 3400);
}

/* ================= Router ================= */
let EPOCH = 0;
function setNav(name) {
  $$(".nav a").forEach(a => a.classList.toggle("on", a.dataset.nav === name));
}
function route() {
  const ep = ++EPOCH;
  window.scrollTo(0, 0);
  if (!TOKEN) { renderAuth(); return; }   // login gate — everything requires a session
  const h = location.hash || "#/";
  if (h.startsWith("#/s/")) viewRun(decodeURIComponent(h.slice(4).split("?")[0]), ep);
  else if (h.startsWith("#/settings")) viewSettings(ep);
  else viewDash(ep);
}
window.addEventListener("hashchange", route);

/* ================= Auth ================= */
function renderAuth() {
  EPOCH++;  // abort any in-flight view render (e.g. after a mid-session 401)
  setNav("");
  const nav = document.querySelector(".nav"); if (nav) nav.hidden = true;
  app.innerHTML = `<div class="view" style="max-width:400px;margin:6vh auto 0">
    <div class="card card-pad">
      <h1 style="font-size:22px">${esc(L("Sign in to QuotePilot", "登录 QuotePilot"))}</h1>
      <p class="sub" style="margin-top:6px">${esc(L("New username? An account is created automatically.", "用户名不存在时将自动为你创建账号。"))}</p>
      <div class="grid2" style="grid-template-columns:1fr;margin-top:18px">
        <label class="fld"><span>${esc(L("Username", "用户名"))}</span>
          <input id="authUser" autocomplete="username" placeholder="${esc(L("3–32 chars", "3–32 位"))}"></label>
        <label class="fld"><span>${esc(L("Password", "密码"))}</span>
          <input id="authPass" type="password" autocomplete="current-password" placeholder="${esc(L("min 6 chars", "至少 6 位"))}"></label>
      </div>
      <p class="char-hint" id="authHint" style="margin-top:10px;min-height:16px"></p>
      <button class="btn btn-pri btn-big" id="authBtn" style="margin-top:6px;width:100%">${esc(L("Continue", "继续"))}</button>
    </div>
  </div>`;
  const user = $("#authUser"), pass = $("#authPass"), hint = $("#authHint"), btn = $("#authBtn");
  async function go() {
    const u = user.value.trim(), p = pass.value;
    if (u.length < 3 || p.length < 6) { hint.className = "char-hint bad"; hint.textContent = L("Username ≥3 and password ≥6 characters.", "用户名至少 3 位、密码至少 6 位。"); return; }
    btn.disabled = true; btn.innerHTML = '<span class="spin"></span>' + esc(L("Signing in…", "登录中…"));
    try {
      const r = await jfetch("/api/auth", { method: "POST", body: JSON.stringify({ username: u, password: p }) });
      setSession(r.token, r.username);
      location.hash = "#/";
      route();
    } catch (e) {
      btn.disabled = false; btn.textContent = L("Continue", "继续");
      hint.className = "char-hint bad";
      hint.textContent = e.status === 401 ? L("Wrong password for this username.", "该用户名密码错误。") : (L("Sign-in failed: ", "登录失败：") + e.message);
    }
  }
  btn.addEventListener("click", go);
  pass.addEventListener("keydown", e => { if (e.key === "Enter") go(); });
  user.focus();
}
function logout() { clearSession(); location.hash = "#/"; renderAuth(); }

function errorCard(title, e, retryHash) {
  return `<section class="card center-card view">
    <div class="glyph" style="background:var(--bad-bg);color:var(--bad)">!</div>
    <h2>${esc(title)}</h2>
    <p>${esc(e && e.message || "")}<br><span class="mono" style="font-size:11px;color:var(--faint)">API: ${esc(API)}</span></p>
    <button class="btn btn-pri" onclick="location.hash='${retryHash || "#/"}';window.dispatchEvent(new HashChangeEvent('hashchange'))">${esc(L("Retry", "重试"))}</button>
  </section>`;
}

/* ================= Dashboard ================= */
let BOOT = null;

async function fetchBootstrap() {
  let lastErr;
  for (let i = 0; i < 3; i++) {
    try { BOOT = await jfetch("/api/bootstrap"); return BOOT; }
    catch (e) { lastErr = e; if (i < 2) await sleep(2000 * (i + 1)); }
  }
  throw lastErr;
}

async function viewDash(ep) {
  setNav("dash");
  if (!BOOT) {
    app.innerHTML = `<div class="view">
      <div class="skel" style="height:34px;width:320px"></div>
      <div class="skel" style="height:16px;width:440px;max-width:90%;margin-top:12px"></div>
      <div class="skel" style="height:230px;margin-top:22px;border-radius:16px"></div>
      <div class="skel" style="height:120px;margin-top:18px;border-radius:16px"></div>
      <p class="coldstart">${esc(L("Waking the serverless instance — cold starts take ~5 s. It's doing its morning stretches.", "正在唤醒无服务器实例…冷启动约 5 秒，它正在做热身运动。"))}</p>
    </div>`;
    try { await fetchBootstrap(); }
    catch (e) {
      if (ep !== EPOCH) return;
      app.innerHTML = errorCard(L("Could not reach the backend", "无法连接后端"), e, "#/");
      return;
    }
    if (ep !== EPOCH) return;
  } else {
    fetchBootstrap().then(() => { if (ep === EPOCH) renderDashLists(); }).catch(() => {});
  }
  renderDash(ep);
}

function sampleChip(s) {
  const name = typeof s === "string" ? s : (s.name || s.id || "");
  const label = typeof s === "string" ? s : (s.title || s.label || s.name || name);
  const isZh = /zh|cn|中/i.test(name + label) || /[\u4e00-\u9fff]/.test(label);
  return `<button class="chip" data-sample="${esc(name)}"><span class="lang">${isZh ? "中" : "EN"}</span>${esc(label)}</button>`;
}

function runRow(r) {
  const sid = r.sid || "";
  return `<a class="row" href="#/s/${encodeURIComponent(sid)}">
    <span class="row-main"><b>${esc(r.company || L("Parsing…", "解析中…"))}</b><span class="row-sub mono">${esc(r.quote_number || sid.slice(0, 10))}</span></span>
    <span class="row-amt">${r.total_usd != null ? `<b>${fmtUSD(r.total_usd)}</b><span>${fmtCNY(r.total_cny)}</span>` : `<span class="faint">—</span>`}</span>
    ${pill(r.status)}
    <span class="row-time">${esc(fmtTime(r.created_at))}</span>
  </a>`;
}
function archRow(r, i) {
  const sid = r.sid || r.run_id || "";
  const st = r.status || ({ approve: "approved", reject: "rejected", approved: "approved", rejected: "rejected" }[r.decision]) || r.decision;
  return `<a class="row" href="#/s/${encodeURIComponent(sid)}">
    <span class="row-main"><b>${esc(r.company || "—")}</b><span class="row-sub mono">${esc(r.quote_number || sid.slice(0, 10))}</span></span>
    <span class="row-amt">${r.total_usd != null ? `<b>${fmtUSD(r.total_usd)}</b>${r.total_cny != null ? `<span>${fmtCNY(r.total_cny)}</span>` : ""}` : `<span class="faint">—</span>`}</span>
    ${pill(st)}
    <button class="btn btn-ghost btn-sm" data-arch="${i}">${esc(L("View quote", "查看报价单"))}</button>
  </a>`;
}

function renderDash(ep) {
  const samples = (BOOT && BOOT.samples) || [];
  app.innerHTML = `<div class="view">
    <h1>${esc(L("Autopilot for inbound inquiry emails", "全自动询价邮件"))}</h1>
    <p class="sub" style="max-width:640px;margin-top:8px">${esc(L("A Qwen agent parses the inquiry, prices it against your catalog with live FX, screens business / legal / tax risk, and drafts a bilingual quote — with exactly one human approval.", "Qwen 智能体解析询价、按目录与实时汇率定价、扫描业务/法务/税务风险并起草中英双语报价——全程只需您批准一次。"))}</p>

    <section class="card hero" style="margin-top:22px">
      <div class="samples">
        <span class="samples-label">${esc(L("Try a sample:", "试试样例："))}</span>
        ${samples.map(sampleChip).join("") || `<span class="faint" style="font-size:12px">${esc(L("No samples", "暂无样例"))}</span>`}
      </div>
      <textarea id="emailText" class="email-box" placeholder="${esc(L("Paste the inbound inquiry email here (English or 中文)…", "在此粘贴客户的询价邮件（中文或英文均可）…"))}" spellcheck="false"></textarea>
      <div class="hero-foot">
        <span class="char-hint" id="charHint"></span>
        <button class="btn btn-pri btn-big" id="runBtn">${esc(L("Run Autopilot", "启动自动报价"))}</button>
      </div>
    </section>

    <div class="sec-h"><h2>${esc(L("Active runs", "进行中"))}</h2><span id="liveTag"></span></div>
    <section class="card"><div class="rows" id="activeRows"></div></section>

    <div class="sec-h"><h2>${esc(L("Archive", "归档"))}</h2></div>
    <section class="card"><div class="rows" id="archRows"></div></section>
  </div>`;

    } catch (e) {
      btn.disabled = false;
      btn.textContent = L("Run Autopilot", "启动自动报价");
      if (e.status === 422) { hint.className = "char-hint bad"; hint.textContent = L("Rejected: too short (422)", "邮件内容太短，服务器已拒绝（422）"); }
      else toast(L("Submit failed: ", "提交失败：") + e.message, "bad");

  });

  $("#archRows").addEventListener("click", e => {
    const b = e.target.closest("[data-arch]");

    e.preventDefault(); e.stopPropagation();
    openArchivedQuote(((BOOT && BOOT.archived) || [])[+b.dataset.arch], b);

    const act = (BOOT && BOOT.submissions) || [];
    if (!act.some(r => r.status === "running")) return;
    setTimeout(async () => {
      if (ep !== EPOCH) return;
      try { await fetchBootstrap(); } catch (e) { return; }

/* ---- stage helpers ---- */
function normStages(raw) {
  const m = {};
  (raw || []).forEach((st, i) => {
    if (st == null) return;
    if (typeof st === "string") { m[st] = { status: "done", detail: "" }; return; }
    const key = st.key || st.stage || st.name || st.id || (STAGES[i] && STAGES[i].key);
    if (!key) return;
    m[key] = { status: String(st.status || st.state || "done"), detail: st.detail || st.message || st.note || st.summary || "" };
  });
  return m;
}
function stageClass(raw) {
  if (/done|complete|success|ok|finish/i.test(raw)) return "is-done";
  if (/run|active|progress|start|working/i.test(raw)) return "is-active";
  if (/fail|error/i.test(raw)) return "is-failed";
  return "is-pending";
}
function stageRow(stg, i) {
  return `<div class="stg is-pending" id="stg-${stg.key}">
    <div class="stg-rail"><span class="stg-dot"></span>${i < STAGES.length - 1 ? '<span class="stg-line"></span>' : ""}</div>
    <div class="stg-body"><p class="stg-zh">${esc(L(stg.en, stg.zh))}</p><p class="stg-note"></p></div>
    <span class="stg-state">${esc(L("waiting", "等待"))}</span>
  </div>`;
}
const STG_LABEL = () => ({ "is-done": L("done", "完成"), "is-active": L("working", "进行中"), "is-failed": L("failed", "失败"), "is-pending": L("waiting", "等待") });
function updateStages(raw, runStatus) {
  const m = normStages(raw);
  const lbl = STG_LABEL();
  let doneCount = 0, sawActive = false;
  STAGES.forEach(stg => {
    const el = document.getElementById("stg-" + stg.key);
    if (!el) return;
    const info = m[stg.key];
    let cls = info ? stageClass(info.status) : "is-pending";
    if (cls === "is-done") doneCount++;
    if (cls === "is-active") sawActive = true;
    el.className = "stg " + cls;
    el.querySelector(".stg-state").textContent = lbl[cls];
    el.querySelector(".stg-note").textContent = info && info.detail ? info.detail : (cls === "is-active" ? L("working…", "处理中…") : "");
  });
  if (!sawActive && runStatus === "running") {
    for (const stg of STAGES) {
      const el = document.getElementById("stg-" + stg.key);
      if (el && el.classList.contains("is-pending")) {
        el.className = "stg is-active";
        el.querySelector(".stg-state").textContent = lbl["is-active"];
        el.querySelector(".stg-note").textContent = L("working…", "处理中…");
        break;
      }
    }
  }
  const p = document.getElementById("pipeProgress");
  if (p) p.innerHTML = `<b>${doneCount}</b>/${STAGES.length}`;
}

/* ---- running view ---- */
function renderRunning(sid, s, ep) {
  app.innerHTML = `<div class="view">${runHeader(sid, s)}
    <h1 style="margin-bottom:4px">${esc(L("The agent is on it", "智能体正在处理"))}</h1>
    <p class="sub">${esc(L("Parse → FX → pricing → risk → draft, about 15–25 s. It will pause for your approval when the draft is ready.", "解析 → 汇率 → 定价 → 风控 → 起草，全程约 15–25 秒。完成后将暂停，等待您审批。"))}</p>
    <section class="card card-pad" style="margin-top:20px">
      <div class="pipe-head">
        <h2>${esc(L("Pipeline", "流水线"))}</h2>
        <div class="pipe-meta"><span>${esc(L("Elapsed", "已用时"))} <b id="elapsed">0</b>s</span><span>${esc(L("Stage", "阶段"))} <span id="pipeProgress"><b>0</b>/6</span></span></div>
      </div>
      <div class="pipe">${STAGES.map(stageRow).join("")}</div>
      <p class="reconnect" id="reconnect" hidden></p>
    </section>
  </div>`;

  updateStages(s.stages, "running");

  const t0 = (() => { const d = new Date(s.created_at); return isNaN(d) ? Date.now() : d.getTime(); })();
  const tick = setInterval(() => {
    if (ep !== EPOCH) { clearInterval(tick); return; }
    const el = document.getElementById("elapsed");
    if (el) el.textContent = Math.max(0, Math.round((Date.now() - t0) / 1000));
  }, 1000);

  let fails = 0;
  (async function poll() {
    await sleep(1500);
    if (ep !== EPOCH) return;
    try {
      const st = await jfetch(`/s/${encodeURIComponent(sid)}/state`);
      if (ep !== EPOCH) return;
      fails = 0;
      const rc = document.getElementById("reconnect");
      if (rc) rc.hidden = true;
      updateStages(st.stages, st.status);
      if (st.status && st.status !== "running") { viewRun(sid, ep); return; }
    } catch (e) {
      if (ep !== EPOCH) return;
      fails++;
      const rc = document.getElementById("reconnect");
      if (rc) { rc.hidden = false; rc.textContent = L(`Reconnecting (attempt ${fails})…`, `连接不稳定，正在重连（第 ${fails} 次）…`); }
      if (fails > 20) {
        app.innerHTML = errorCard(L("Lost contact with the backend after 20 attempts", "重连 20 次后仍与后端失去联系"), e, "#/s/" + encodeURIComponent(sid));
        return;
      }
    }
    poll();
  })();
}

// View untrusted HTML in a fully-sandboxed iframe (no scripts, unique origin)
// inside a modal — never window.open a same-origin blob of server HTML.
function viewHtmlSandboxed(htmlText, title) {
  const back = document.createElement("div");
  back.style.cssText = "position:fixed;inset:0;z-index:200;background:rgba(15,30,48,.55);display:flex;flex-direction:column;padding:24px";
  const bar = document.createElement("div");
  bar.style.cssText = "display:flex;justify-content:space-between;align-items:center;color:#fff;max-width:900px;width:100%;margin:0 auto 10px;font-size:13px";
  const t = document.createElement("span"); t.textContent = title || "Quote"; bar.appendChild(t);
  const x = document.createElement("button"); x.textContent = "✕ " + L("Close", "关闭");
  x.className = "btn btn-ghost btn-sm"; bar.appendChild(x);
  const frame = document.createElement("iframe");
  frame.setAttribute("sandbox", "");                 // no scripts, no same-origin
  frame.setAttribute("title", title || "Quote");
  frame.srcdoc = String(htmlText);
  frame.style.cssText = "flex:1;width:100%;max-width:900px;margin:0 auto;border:none;border-radius:10px;background:#fff";
  back.appendChild(bar); back.appendChild(frame);
  const close = () => back.remove();
  x.addEventListener("click", close);
  back.addEventListener("click", e => { if (e.target === back) close(); });
  document.body.appendChild(back);
}

async function openArtifact(a, btn) {
  if (!a) return;
  if (btn) btn.classList.add("loading");
  try {
    const r = await fetch(`${API}/artifacts/${encodeURIComponent(a.run_id)}/${encodeURIComponent(a.filename)}`, { headers: authHeader() });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const fn = a.filename || "artifact";
    if (/\.html?$/i.test(fn)) {                        // render safely, never execute
      viewHtmlSandboxed(await r.text(), fn);
    } else {                                           // everything else: download
      const u = URL.createObjectURL(await r.blob());
      const l = document.createElement("a"); l.href = u; l.download = fn;
      document.body.appendChild(l); l.click(); l.remove();
      setTimeout(() => URL.revokeObjectURL(u), 60000);
    }
  } catch (e) { toast(L("Artifact failed: ", "产物加载失败：") + e.message, "bad"); }
  finally { if (btn) btn.classList.remove("loading"); }
}

let PROFILE = null, DIRTY = false;

function normProfile(p) {
  p = (p && typeof p === "object") ? p : {};
  p.seller = p.seller || {}; p.terms = p.terms || {}; p.rules = p.rules || {};
  p.catalog = Array.isArray(p.catalog) ? p.catalog : [];
  p.catalog.forEach(it => { if (it._disc == null) it._disc = discToStr(it.volume_discounts); });
  return p;
}
function discToStr(vd) { return (vd || []).map(d => `${d.min_qty}:${d.pct}`).join(", "); }
function parseDisc(s) {
  return String(s || "").split(/[,，;；]/).map(t => t.trim()).filter(Boolean).map(t => {
    const parts = t.split(/[:：]/);
    return { min_qty: Number(parts[0]), pct: Number(parts[1]) };
  }).filter(d => isFinite(d.min_qty) && isFinite(d.pct));
}
function setPath(o, p, v) {
  const ks = p.split(".");
  let t = o;
  for (let i = 0; i < ks.length - 1; i++) { t[ks[i]] = t[ks[i]] || {}; t = t[ks[i]]; }
  t[ks[ks.length - 1]] = v;
}

        <button class="btn btn-ghost btn-sm" id="addItem">＋ ${esc(L("Add item", "添加产品"))}</button>
      </div>
      <p class="sub">${L('Volume discounts use compact syntax: <code class="mono" style="font-size:11.5px;background:var(--blue-ghost);padding:2px 6px;border-radius:5px">50:8, 100:12</code> = 8% off from 50 units, 12% off from 100.', '阶梯折扣使用紧凑语法：<code class="mono" style="font-size:11.5px;background:var(--blue-ghost);padding:2px 6px;border-radius:5px">50:8, 100:12</code> 表示满 50 件减 8%、满 100 件减 12%。')}</p>
      <div class="scroll-x">
        <table class="cat-table">
          <thead><tr>
            <th>SKU</th><th>${esc(L("Name (ZH)", "名称（中）"))}</th><th>${esc(L("Name (EN)", "名称（英）"))}</th>
            <th>${esc(L("Unit (ZH)", "单位（中）"))}</th><th>${esc(L("Unit (EN)", "单位（英）"))}</th>
            <th style="text-align:right">${esc(L("Unit price (USD)", "单价（USD）"))}</th><th>${esc(L("Volume discounts", "阶梯折扣"))}</th><th></th>
          </tr></thead>
          <tbody id="catBody">${catalogRows()}</tbody>
        </table>
      </div>
    </section>

    <div class="demo-note" style="margin-top:18px">
      <span style="font-size:15px">ⓘ</span>
      <span><b>${esc(L("Demo persistence", "演示环境提示"))}</b>${esc(L(": settings live in the serverless instance's memory and reset to defaults when it is recycled.", "：设置保存在无服务器实例的内存中，实例被回收后将恢复默认值。"))}</span>
    </div>
    <p class="api-line">API: ${esc(API)} — override via localStorage "QP_API"</p>

    <div class="savebar${DIRTY ? " show" : ""}" id="savebar">
      <div class="savebar-in">
        <span>${esc(L("Unsaved changes", "有未保存的更改"))}</span>
        <div class="btns">
          <button class="btn btn-ghost" id="discardBtn">${esc(L("Discard", "放弃"))}</button>
          <button class="btn btn-pri" id="saveBtn">${esc(L("Save settings", "保存设置"))}</button>
        </div>
      </div>
    </div>
  </div>`;

  const root = app.firstElementChild;

  /* language toggle — applies immediately, no save needed */
  document.getElementById("langSeg").addEventListener("click", e => {
    const b = e.target.closest("[data-lang]");
    if (!b || b.dataset.lang === LANG) return;
    setLang(b.dataset.lang);
  });

  root.addEventListener("input", e => {
    const el = e.target;
    if (el.dataset.path) {
      const v = el.type === "number" ? (el.value === "" ? null : Number(el.value)) : el.value;
      setPath(PROFILE, el.dataset.path, v);
      markDirty();
      return;
    }
    if (el.dataset.ci != null && el.dataset.cf) {
      const it = PROFILE.catalog[+el.dataset.ci];
      if (!it) return;
      if (el.dataset.cf === "unit_price_usd") it.unit_price_usd = el.value === "" ? null : Number(el.value);
      else it[el.dataset.cf] = el.value;
      markDirty();
    }
  });

  document.getElementById("addItem").addEventListener("click", () => {
    PROFILE.catalog.push({ sku: "", name_en: "", name_zh: "", description_en: "", description_zh: "", unit: "pc", unit_zh: "件", unit_price_usd: null, volume_discounts: [], _disc: "" });
    document.getElementById("catBody").innerHTML = catalogRows();
    markDirty();
  });
  document.getElementById("catBody").addEventListener("click", e => {
    const b = e.target.closest("[data-del]");
    if (!b) return;
    PROFILE.catalog.splice(+b.dataset.del, 1);
    document.getElementById("catBody").innerHTML = catalogRows();
    markDirty();
  });

  document.getElementById("saveBtn").addEventListener("click", async () => {
    const btn = document.getElementById("saveBtn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>' + esc(L("Saving & auto-translating…", "保存中，AI 补齐翻译…"));
    try {
      const body = JSON.parse(JSON.stringify(PROFILE));
      (body.catalog || []).forEach(it => { it.volume_discounts = parseDisc(it._disc); delete it._disc; });
      // /api/profile/save auto-fills missing EN/中文 fields with Qwen (legal terms excluded), then saves.
      const res = await jfetch("/api/profile/save", { method: "POST", body: JSON.stringify(body) });
      clearDirty();
      const n = (res.filled || []).length;
      if (n > 0) {
        // refresh the form to show the AI-filled translations
        PROFILE = normProfile(res.profile);
        viewSettings(ep);
        toast(L(`Saved · AI filled ${n} missing translation${n > 1 ? "s" : ""} (legal terms not auto-translated)`,
                `已保存 · AI 补齐了 ${n} 处缺失翻译（法律条款不自动翻译）`), "ok");
      } else {
        toast(L("Settings saved", "设置已保存"), "ok");
      }
    } catch (e) {
      toast(L("Save failed: ", "保存失败：") + e.message, "bad");
    } finally {
      btn.disabled = false;
      btn.textContent = L("Save settings", "保存设置");
    }
  });
  document.getElementById("discardBtn").addEventListener("click", () => { clearDirty(); viewSettings(ep); });

  const IMPORT_PHASES = [
    L("Fetching the website…", "正在访问网站…"),
    L("Qwen is reading the pages…", "Qwen 正在阅读页面…"),
    L("Extracting company info & catalog…", "提取公司信息与产品目录…"),
    L("Polishing the draft — 15–30 s in total…", "整理草稿——全程约 15–30 秒…")
  ];
  document.getElementById("importBtn").addEventListener("click", async () => {
    const inp = document.getElementById("importUrl");
    let url = inp.value.trim();
    if (!url) { inp.focus(); return; }
    if (!/^https?:\/\//i.test(url)) url = "https://" + url;
    const btn = document.getElementById("importBtn"), status = document.getElementById("importStatus");
    btn.disabled = true; inp.disabled = true;
    let phase = 0;
    status.innerHTML = `<p class="import-phase">${esc(IMPORT_PHASES[0])}</p>`;
    const cyc = setInterval(() => {
      phase = Math.min(phase + 1, IMPORT_PHASES.length - 1);
      const el = status.querySelector(".import-phase");
      if (el) el.textContent = IMPORT_PHASES[phase];
    }, 5000);
    try {
      const res = await jfetch("/api/profile/import", { method: "POST", body: JSON.stringify({ url }) });
      clearInterval(cyc);
      if (ep !== EPOCH) return;
      const d = res && res.draft;
      if (d) {
        if (d.seller) for (const k in d.seller) { if (d.seller[k] != null && d.seller[k] !== "") PROFILE.seller[k] = d.seller[k]; }
        if (Array.isArray(d.catalog) && d.catalog.length) { PROFILE.catalog = d.catalog; PROFILE.catalog.forEach(it => { it._disc = discToStr(it.volume_discounts); }); }
        if (d.rules) for (const k in d.rules) { if (d.rules[k] != null && d.rules[k] !== "") PROFILE.rules[k] = d.rules[k]; }
        /* terms are intentionally never overwritten */
      }
      DIRTY = true;
      let note = `<p class="import-note in-ok">${esc(L("Draft applied from the website — review and save. Legal & tax terms were left untouched.", "已根据网站预填公司信息与目录草稿，请核对后保存。法务/税务条款保持不变。"))}${res && res.note ? "<br>" + esc(res.note) : ""}</p>`;
      if (res && res.needs_price) note += `<p class="import-note in-warn" style="margin-top:8px">${esc(L("Some items came without prices — fill them in before saving.", "部分产品缺少价格，请在目录中手动补充后再保存。"))}</p>`;
      renderSettings(ep, note);
      toast(L("Import complete", "网站导入完成"), "ok");
    } catch (e) {
      clearInterval(cyc);
      if (ep !== EPOCH) return;
      status.innerHTML = `<p class="import-note in-warn">${esc(L("Import failed: ", "导入失败："))}${esc(e.message)}${esc(L(" — check the URL and try again.", " — 请检查网址后重试。"))}</p>`;
      btn.disabled = false; inp.disabled = false;
    }
  });
}

/* ================= boot ================= */
const _navLogout = document.getElementById("navLogout");
if (_navLogout) _navLogout.addEventListener("click", e => { e.preventDefault(); logout(); });
applyChrome();
route();
</script>
</body>
</html>
