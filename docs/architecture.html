<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QuotePilot — Architecture</title>
<style>
  :root{
    --blue:#0f4c81; --blue-deep:#0b3a64; --ink:#152230; --muted:#5a6b7b;
    --line:#d7e0ea; --bg:#eef3f8; --card:#ffffff; --ok:#177a4c; --amber:#b07900;
    --qwen:#6a3df0; --qwen-bg:#efeafe; --ali:#ff6a00; --ali-bg:#fff1e6;
    --sans:"Helvetica Neue",Helvetica,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:radial-gradient(120% 120% at 50% 0%,#f6fafd 0%,var(--bg) 55%,#e6edf4 100%);
       font-family:var(--sans);color:var(--ink);display:grid;place-items:center;overflow:hidden}
  .stage{width:1280px;height:720px;position:relative;overflow:hidden}
  /* header */
  .hd{position:absolute;top:34px;left:52px;right:52px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:13px}
  .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--blue-deep));
        color:#fff;display:grid;place-items:center;font-weight:800;font-size:17px;letter-spacing:.02em;
        box-shadow:0 6px 18px rgba(15,76,129,.4)}
  .brand b{font-size:23px;font-weight:750;letter-spacing:-.01em}
  .brand .z{font-size:13px;color:var(--muted);margin-left:8px;font-weight:500}
  .hd .tag{font-size:12.5px;color:var(--muted);text-align:right;line-height:1.5}
  .hd .tag b{color:var(--blue-deep)}
  /* svg canvas */
  svg{position:absolute;inset:0;width:100%;height:100%}
  .node{fill:var(--card);stroke:var(--line);stroke-width:1.5;rx:16}
  .node.hl{stroke:var(--blue);stroke-width:2.5}
  .lbl{font-family:var(--sans);fill:var(--ink)}
  .t-title{font-size:15px;font-weight:750}
  .t-sub{font-size:11.5px;fill:var(--muted)}
  .t-zh{font-size:11px;fill:var(--muted)}
  .t-tag{font-size:10px;font-weight:800;letter-spacing:.08em}
  .wire{fill:none;stroke:#b9c8d6;stroke-width:2}
  .wire.q{stroke:#c9bef7}
  .wire.a{stroke:#ffcfa6}
  .flow{fill:none;stroke-width:2.4;stroke-dasharray:5 9;stroke-linecap:round;
        animation:dash 1.1s linear infinite;opacity:.0}
  .flow.on{opacity:.9}
  @keyframes dash{to{stroke-dashoffset:-28}}
  .particle{opacity:0}
  .particle.on{opacity:1}
  /* pipeline pills */
  .pil{transition:all .35s ease}
  .pil .box{fill:#f4f7fb;stroke:#e3eaf1;stroke-width:1.4;rx:9}
  .pil.done .box{fill:#e9f5ee;stroke:var(--ok)}
  .pil.active .box{fill:#e8f0f8;stroke:var(--blue);stroke-width:2.2}
  .pil .dot{fill:#cdd8e3;transition:all .35s}
  .pil.done .dot{fill:var(--ok)}
  .pil.active .dot{fill:var(--blue)}
  .pil .pt{font-size:12px;font-weight:650;fill:var(--muted);transition:fill .35s}
  .pil.done .pt,.pil.active .pt{fill:var(--ink)}
  .pil .pz{font-size:10px;fill:#9aa8b5}
  .pil .model{font-size:9px;font-weight:800;letter-spacing:.03em;fill:var(--qwen);opacity:0;transition:opacity .35s}
  .pil.active .model{opacity:1}
  .gate{transition:all .4s}
  .gate .g{fill:#fff8ec;stroke:#eecf8f;stroke-width:1.6;rx:14}
  .gate.active .g{fill:#fdf1d6;stroke:var(--amber);stroke-width:2.6;filter:url(#glow)}
  .gate .gi{fill:var(--amber);opacity:.55;transition:opacity .4s}
  .gate.active .gi{opacity:1;animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.4}}
  .badge{font-size:10.5px;font-weight:700}
  .pop{opacity:0;transform-box:fill-box;transform-origin:center;transition:opacity .4s,transform .4s}
  .pop.on{opacity:1}
  .caption{position:absolute;left:52px;bottom:30px;font-size:13px;color:var(--muted)}
  .caption b{color:var(--blue-deep)}
  .foot{position:absolute;right:52px;bottom:30px;font-size:11.5px;color:#8ea0b0;font-family:var(--mono)}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="hd">
    <div class="brand"><span class="logo">QP</span><b>QuotePilot</b><span class="z">报价领航 · 架构</span></div>
    <div class="tag">Autopilot agent for cross-border B2B quotes<br><b>powered by Qwen on Alibaba Cloud</b></div>
  </div>

  <svg viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid meet">
    <defs>
      <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <marker id="arw" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
        <path d="M0,0 L7,3 L0,6 Z" fill="#9fb0be"/>
      </marker>
    </defs>

    <!-- ===== wires (drawn first, under nodes) ===== -->
    <!-- email -> UI -->
    <path id="w1" class="wire" d="M232,300 H322" marker-end="url(#arw)"/>
    <!-- UI -> FC -->
    <path id="w2" class="wire" d="M520,300 H612" marker-end="url(#arw)"/>
    <!-- FC pipeline -> gate -->
    <path id="w3" class="wire" d="M900,300 H986" marker-end="url(#arw)"/>
    <!-- gate -> outputs -->
    <path id="w4" class="wire" d="M1116,300 H1150 M1150,300 V246 H1176 M1150,300 V356 H1176" marker-end="url(#arw)"/>
    <!-- pipeline <-> Qwen models (top) -->
    <path id="wq" class="wire q" d="M756,150 V196" marker-end="url(#arw)"/>
    <!-- pipeline <-> FX API (bottom) -->
    <path id="wf" class="wire a" d="M740,558 V536" marker-end="url(#arw)"/>
    <!-- FC -> ephemeral /tmp store (bottom right) -->
    <path id="ws" class="wire" d="M890,532 V558" marker-end="url(#arw)"/>

    <!-- animated flow overlays -->
    <path class="flow" id="f1" d="M232,300 H322" stroke="#7fa8cf"/>
    <path class="flow" id="f2" d="M520,300 H612" stroke="#7fa8cf"/>
    <path class="flow q" id="fq" d="M756,196 V150" stroke="#9d84f0"/>
    <path class="flow a" id="ff" d="M740,558 V536" stroke="#f2a865"/>
    <path class="flow" id="f3" d="M900,300 H986" stroke="#e0b45a"/>
    <path class="flow" id="f4" d="M1116,300 H1176" stroke="#5fa87f"/>

    <!-- particles -->
    <circle class="particle" r="4" fill="#2f76b8"><animateMotion dur="1.3s" repeatCount="indefinite"><mpath href="#f1"/></animateMotion></circle>
    <circle class="particle" r="4" fill="#2f76b8"><animateMotion dur="1.3s" repeatCount="indefinite"><mpath href="#f2"/></animateMotion></circle>
    <circle class="particle q" r="4" fill="var(--qwen)"><animateMotion dur="1.0s" repeatCount="indefinite"><mpath href="#fq"/></animateMotion></circle>
    <circle class="particle a" r="4" fill="var(--ali)"><animateMotion dur="1.0s" repeatCount="indefinite"><mpath href="#ff"/></animateMotion></circle>
    <circle class="particle" r="4" fill="#c99327"><animateMotion dur="1.2s" repeatCount="indefinite"><mpath href="#f3"/></animateMotion></circle>
    <circle class="particle" r="4" fill="var(--ok)"><animateMotion dur="1.3s" repeatCount="indefinite"><mpath href="#f4"/></animateMotion></circle>

    <!-- ===== nodes ===== -->
    <!-- email -->
    <g>
      <rect class="node" x="60" y="252" width="172" height="96"/>
      <text class="lbl t-title" x="80" y="288">Inquiry email</text>
      <text class="lbl t-sub" x="80" y="308">EN or 中文, inbound</text>
      <text class="lbl t-zh" x="80" y="326">客户询价邮件</text>
    </g>

    <!-- GitHub Pages SPA -->
    <g>
      <rect class="node" x="322" y="242" width="198" height="116"/>
      <text class="lbl t-tag" x="342" y="272" fill="#2f76b8">FRONTEND · GITHUB PAGES</text>
      <text class="lbl t-title" x="342" y="296">Static SPA</text>
      <text class="lbl t-sub" x="342" y="315">submit · watch · approve/edit</text>
      <text class="lbl t-zh" x="342" y="333">静态单页 · fetch JSON API</text>
    </g>

    <!-- Qwen models (top) -->
    <g>
      <rect class="node" x="600" y="70" width="312" height="80" style="fill:var(--qwen-bg);stroke:#d4c8fb"/>
      <text class="lbl t-tag" x="620" y="98" fill="var(--qwen)">QWEN ON DASHSCOPE (OpenAI-compatible)</text>
      <text class="lbl" x="620" y="122" style="font-size:12.5px;font-weight:700;fill:#3f2aa8">qwen-max · qwen-flash · qwen3-coder-plus</text>
      <text class="lbl t-zh" x="620" y="139" style="fill:#7a6bd0">planner · workers · structured output</text>
    </g>

    <!-- Alibaba Cloud FC box with pipeline -->
    <g>
      <rect class="node" x="612" y="180" width="288" height="352" style="fill:#fbfdff;stroke:#dbe6f0"/>
      <rect x="612" y="180" width="288" height="34" style="fill:var(--ali-bg);stroke:none" rx="16"/>
      <text class="lbl t-tag" x="632" y="202" fill="var(--ali)">ALIBABA CLOUD FUNCTION COMPUTE · ap-southeast-1</text>
      <!-- 6 pipeline pills -->
      <g id="pipe"></g>
    </g>

    <!-- FX API (below the FC box) -->
    <g>
      <rect class="node" x="656" y="558" width="200" height="64" style="fill:#fff;stroke:#e6d6c2"/>
      <text class="lbl t-tag" x="674" y="583" fill="var(--ali)">LIVE FX · KEYLESS</text>
      <text class="lbl t-sub" x="674" y="601" style="fill:var(--ink);font-weight:650">open.er-api.com</text>
      <text class="lbl t-zh" x="674" y="617">USD/CNY, cached</text>
    </g>

    <!-- Ephemeral per-instance store (all user data lives here) -->
    <g>
      <rect class="node" x="880" y="558" width="246" height="64" style="fill:#fff;stroke:#e6d6c2"/>
      <text class="lbl t-tag" x="898" y="583" fill="var(--ali)">EPHEMERAL STORE · /tmp</text>
      <text class="lbl t-sub" x="898" y="601" style="fill:var(--ink);font-weight:650">accounts · profiles · runs — per instance</text>
      <text class="lbl t-zh" x="898" y="617">临时存储 · 实例回收自动清除</text>
    </g>

    <!-- Human approval gate -->
    <g class="gate" id="gate">
      <rect class="g" x="986" y="238" width="130" height="124"/>
      <circle class="gi" cx="1051" cy="286" r="16"/>
      <text x="1051" y="292" text-anchor="middle" style="font-size:17px;fill:#fff;font-weight:800">✓</text>
      <text class="lbl" x="1051" y="326" text-anchor="middle" style="font-size:12px;font-weight:750;fill:#8a5c00">Human gate</text>
      <text class="lbl t-zh" x="1051" y="343" text-anchor="middle" style="fill:#a5762a">批准 / 编辑 / 驳回</text>
    </g>

    <!-- outputs -->
    <g>
      <rect class="node" x="1176" y="210" width="44" height="72" style="fill:#fff"/>
      <text x="1198" y="252" text-anchor="middle" style="font-size:20px">📄</text>
      <text class="lbl t-zh" x="1198" y="298" text-anchor="middle">报价单</text>
      <rect class="node" x="1176" y="326" width="44" height="72" style="fill:#fff"/>
      <text x="1198" y="368" text-anchor="middle" style="font-size:20px">✉️</text>
      <text class="lbl t-zh" x="1198" y="414" text-anchor="middle">回复邮件</text>
    </g>

    <!-- safety chips (pop in) -->
    <g class="pop" id="chip1">
      <rect x="330" y="470" width="250" height="34" rx="8" style="fill:#eef7f1;stroke:#bfe3cf"/>
      <text class="lbl badge" x="346" y="491" fill="var(--ok)">🔒 LLMs never do the math — Decimal</text>
    </g>
    <g class="pop" id="chip2">
      <rect x="330" y="512" width="250" height="34" rx="8" style="fill:#eef3f9;stroke:#c4d8e8"/>
      <text class="lbl badge" x="346" y="533" fill="var(--blue)">⚖️ Legal terms are fixed, not generated</text>
    </g>
    <g class="pop" id="chip3">
      <rect x="330" y="554" width="250" height="34" rx="8" style="fill:#fdf6e8;stroke:#eeda9f"/>
      <text class="lbl badge" x="346" y="575" fill="var(--amber)">🔑 Per-user login — data isolated</text>
    </g>
  </svg>

  <div class="caption" id="cap"></div>
  <div class="foot">github.com/mark24680617/quotepilot</div>
</div>

<script>
const STAGES = [
  {en:"intake", zh:"解析询价", model:"qwen-flash"},
  {en:"live FX", zh:"实时汇率", model:"open.er-api"},
  {en:"pricing", zh:"目录定价", model:"qwen3-coder"},
  {en:"risk rules", zh:"规则风控", model:"—"},
  {en:"AI risk sweep", zh:"AI 风控扫描", model:"qwen-flash"},
  {en:"drafting", zh:"双语起草", model:"qwen-max"},
];
const CAPS = [
  "An inbound inquiry email arrives — English or 中文.",
  "The static SPA hands it to the agent on Alibaba Cloud.",
  "A 6-stage Qwen pipeline parses, prices, and drafts the quote.",
  "It pauses for exactly one human decision: approve, edit, or reject.",
  "On approval: a bilingual quote + reply-email draft.",
];
// build pipeline pills
const pipe = document.getElementById("pipe");
const X=628, W=256, topY=228, h=44, gap=6;
STAGES.forEach((s,i)=>{
  const y = topY + i*(h+gap);
  const g = document.createElementNS("http://www.w3.org/2000/svg","g");
  g.setAttribute("class","pil"); g.id="pil"+i;
  g.innerHTML = `
    <rect class="box" x="${X}" y="${y}" width="${W}" height="${h}" rx="9"/>
    <circle class="dot" cx="${X+20}" cy="${y+h/2}" r="6"/>
    <text class="pt" x="${X+38}" y="${y+18}">${i+1}. ${s.en}</text>
    <text class="pz" x="${X+38}" y="${y+33}">${s.zh}</text>
    <text class="model" x="${X+W-12}" y="${y+h/2+4}" text-anchor="end">${s.model}</text>`;
  pipe.appendChild(g);
});

const flows = ["f1","f2","fq","ff","f3","f4"].map(id=>document.getElementById(id));
const parts = Array.from(document.querySelectorAll(".particle"));
const cap = document.getElementById("cap");
const gate = document.getElementById("gate");
const on = (el,c=true)=>el && el.classList.toggle("on",c);
const setFlow=(i,v)=>{on(flows[i],v); on(parts[i],v);}

async function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function reset(){
  STAGES.forEach((_,i)=>{const p=document.getElementById("pil"+i);p.classList.remove("done","active");});
  flows.forEach((_,i)=>setFlow(i,false));
  gate.classList.remove("active");
  document.getElementById("chip1").classList.remove("on");
  document.getElementById("chip2").classList.remove("on");
  document.getElementById("chip3").classList.remove("on");
}
async function loop(){
  while(true){
    reset();
    cap.innerHTML = "<b>1.</b> " + CAPS[0];
    setFlow(0,true); await sleep(1400);              // email -> UI
    cap.innerHTML = "<b>2.</b> " + CAPS[1];
    setFlow(0,false); setFlow(1,true); await sleep(1400); // UI -> FC
    setFlow(1,false);
    cap.innerHTML = "<b>3.</b> " + CAPS[2];
    for(let i=0;i<STAGES.length;i++){
      const p=document.getElementById("pil"+i); p.classList.add("active");
      if(i===0||i===4||i===5) setFlow(2,true); else setFlow(2,false);   // qwen link on model stages
      if(i===1) setFlow(3,true); else setFlow(3,false);                 // FX link on FX stage
      await sleep(720);
      p.classList.remove("active"); p.classList.add("done");
    }
    setFlow(2,false); setFlow(3,false);
    document.getElementById("chip1").classList.add("on"); await sleep(250);
    document.getElementById("chip2").classList.add("on"); await sleep(250);
    document.getElementById("chip3").classList.add("on");
    setFlow(4,true);                                  // pipeline -> gate
    await sleep(900);
    cap.innerHTML = "<b>4.</b> " + CAPS[3];
    gate.classList.add("active"); await sleep(1700);
    setFlow(4,false); setFlow(5,true);                // gate -> outputs
    cap.innerHTML = "<b>5.</b> " + CAPS[4];
    await sleep(1900);
    setFlow(5,false); gate.classList.remove("active");
    await sleep(900);
  }
}
loop();
</script>
</body>
</html>
