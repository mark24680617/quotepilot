# ============================================================================
# QuotePilot — Alibaba Cloud Function Compute (FC 3.0) deployment
# This file is the hackathon's Alibaba Cloud DEPLOYMENT PROOF.
#
# Deploy:
#   1. bash deploy/package.sh          # builds ./.deploy_build with vendored deps
#   2. export QWEN_API_KEY=sk-...      # from .env — never commit it
#   3. cd .deploy_build && s deploy
#   4. s info                          # shows the public fcapp.run URL
# ============================================================================
edition: 3.0.0
name: quotepilot
access: default

vars:
  region: ap-southeast-1

resources:
  quotepilot:
    component: fc3
    props:
      region: ${vars.region}
      functionName: quotepilot
      description: QuotePilot — email-to-quote autopilot dashboard (Qwen on Alibaba Cloud)
      # custom.debian12 (Debian 12 bookworm) ships system Python 3.11.2 —
      # no interpreter layer needed (verified by in-instance probe 2026-07-10).
      runtime: custom.debian12
      customRuntimeConfig:
        command:
          - bash
          - /code/bootstrap
        port: 9000
      cpu: 0.35
      memorySize: 512
      diskSize: 512
      timeout: 300
      instanceConcurrency: 10
      environmentVariables:
        QWEN_API_KEY: ${env(QWEN_API_KEY)}
        QWEN_BASE_URL: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
        QP_RUNS_DIR: /tmp/runs
        PYTHONPATH: /code/vendor:/code/src
      code: ./
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - HEAD

  # Custom domain: the fcapp.run system domain force-downloads HTML
  # (Content-Disposition: attachment) and forbids 3xx — a bound custom domain
  # lifts both restrictions. Requires DNS CNAME:
  #   quotepilot.luqlabs.com -> 5473177672583071.ap-southeast-1.fc.aliyuncs.com
  quotepilot_domain:
    component: fc3-domain
    props:
      region: ${vars.region}
      domainName: quotepilot.luqlabs.com
      protocol: HTTP
      routeConfig:
        routes:
          - path: /*
            functionName: quotepilot
